name: AeroPoint CI Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - ci-testing-setup

jobs:
  lint-and-test:
    name: Lint, Audit & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 opencv-python-headless

      - name: Download test video
        run: |
          mkdir -p tests/fixtures
          curl -L -o tests/fixtures/test_hand.mp4 \
            "https://github.com/vbukreev/Cursor-Movement-By-Hand-Gesture-Project/releases/download/test-assets/test_hand.mp4" \
            || echo "Test video not available — video tests will be skipped"

      - name: Run flake8 (critical errors only)
        run: |
          flake8 src tests \
            --select=E9,F63,F7,F82 \
            --count \
            --statistics

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v