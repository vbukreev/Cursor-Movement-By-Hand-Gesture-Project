name: Python Check

on:
  push:
    branches:
      - main
      - add-python-check-workflow
  pull_request:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python mediapipe pyautogui numpy

      - name: Check Python files compile
        run: |
          python -m py_compile src/app.py src/camera_stream.py src/calibrator.py src/controller.py src/gestures.py src/hand_tracker.py src/settings.py src/splash.py